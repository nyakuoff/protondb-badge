name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: npm run build

      - name: Prepare release folder
        run: |
          rm -rf release
          mkdir -p release/protondb-status
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'release' \
            --exclude '.vscode' \
            --exclude '.idea' \
            ./ release/protondb-status/

      - name: Create zip archive
        run: |
          cd release
          zip -r "protondb-status-${{ steps.version.outputs.version }}.zip" protondb-status

      - name: Upload unpacked plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: protondb-status-${{ steps.version.outputs.version }}
          path: release/protondb-status
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: release/protondb-status-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
